services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - movie-network
    ports:
      - "${BACKEND_HOST_PORT:-42002}:8000"
    environment:
      - MOVIE_DB_URL=sqlite:////data/movies.db
    volumes:
      - movie-db-data:/data

  nanobot:
    build:
      context: ./nanobot
      additional_contexts:
        workspace: .
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
        APP_UID: ${HOST_UID:-1000}
        APP_GID: ${HOST_GID:-1000}
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks:
      - movie-network
    volumes:
      - ./nanobot:/app/nanobot
      - ./mcp:/app/mcp
    ports:
      - "${NANOBOT_GATEWAY_PORT:-8765}:${NANOBOT_GATEWAY_PORT:-8765}"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:?'LLM_API_KEY is required'}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_API_MODEL=${LLM_API_MODEL:?'LLM_API_MODEL is required'}
      - MOVIE_BACKEND_URL=http://backend:8000
      - NANOBOT_GATEWAY_HOST=0.0.0.0
      - NANOBOT_GATEWAY_PORT=${NANOBOT_GATEWAY_PORT:-8765}
    depends_on:
      - backend

volumes:
  movie-db-data:

networks:
  movie-network:
    name: movie-network
    attachable: true
